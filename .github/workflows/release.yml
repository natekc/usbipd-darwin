name: release

# Triggered when a maintainer pushes a `vX.Y.Z` tag. Builds release
# binaries for both Apple architectures, codesigns with the Developer
# ID stored in repo secrets, submits to the Apple notary service,
# staples, packages into a tarball, computes SHA256, and attaches
# everything to the GitHub Release.
#
# Required repo secrets:
#   APPLE_CERT_P12        - base64 of the .p12 export of the Developer
#                           ID Application certificate (with private key).
#   APPLE_CERT_PASSWORD   - passphrase for that .p12.
#   APPLE_SIGN_ID         - the certificate's common name, e.g.
#                           "Developer ID Application: Foo (TEAMID)".
#   APPLE_API_KEY_ID      - App Store Connect API key id.
#   APPLE_API_ISSUER_ID   - App Store Connect API issuer id.
#   APPLE_API_KEY_P8      - the .p8 file contents (NOT base64).
#
# If any secret is missing the job degrades to an ad-hoc-signed,
# unnotarized build so non-release pushes (manual workflow_dispatch
# from a fork) still produce something useful.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p usbipd

      # ---- codesign + notarize (only if Apple secrets are present) ----
      - name: Decide signing mode
        id: signmode
        run: |
          if [[ -n "${{ secrets.APPLE_CERT_P12 }}" && -n "${{ secrets.APPLE_SIGN_ID }}" ]]; then
            echo "mode=developer-id" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signmode.outputs.mode == 'developer-id'
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          rm -f /tmp/cert.p12

      - name: Codesign with hardened runtime
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.target }}/release/usbipd
          SIGN_ID="${{ steps.signmode.outputs.mode == 'developer-id' && secrets.APPLE_SIGN_ID || '-' }}"
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_ID" \
            --entitlements dist/usbipd.entitlements \
            "$BIN"
          codesign -dv --verbose=2 "$BIN"

      - name: Notarize
        if: steps.signmode.outputs.mode == 'developer-id'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.target }}/release/usbipd
          mkdir -p /tmp/keys
          echo "$APPLE_API_KEY_P8" > /tmp/keys/AuthKey_${APPLE_API_KEY_ID}.p8
          ditto -c -k --keepParent "$BIN" /tmp/usbipd.zip
          xcrun notarytool submit /tmp/usbipd.zip \
            --key /tmp/keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          # Command-line binaries can't be stapled directly, but the
          # notarization ticket is published to Apple's CDN and verified
          # at first launch.
          rm -rf /tmp/keys

      # ---- package ----
      - name: Stage tarball
        id: pack
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then VERSION="0.0.0-${GITHUB_SHA::7}"; fi
          STAGE="usbipd-darwin-${VERSION}-${{ matrix.arch }}-apple-darwin"
          mkdir -p "dist/$STAGE"
          cp target/${{ matrix.target }}/release/usbipd "dist/$STAGE/"
          cp README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT SECURITY.md "dist/$STAGE/"
          cp -R dist/launchd "dist/$STAGE/launchd"
          (cd dist && tar -czf "${STAGE}.tar.gz" "$STAGE")
          (cd dist && shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.stage }}
          path: |
            dist/${{ steps.pack.outputs.stage }}.tar.gz
            dist/${{ steps.pack.outputs.stage }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show contents
        run: ls -la dist/
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          body_path: CHANGELOG.md
          draft: true
          generate_release_notes: false
